<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Search Focus — Settings</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface-2: #f5f1fc;
      --line: #e7e0f3;
      --text: #1d1630;
      --muted: #6f6685;
      --magenta: #c800be;
      --purple: #8a00e0;
      --glow-magenta: #ff3df0;
      --glow-purple: #9d00ff;
      --success: #0a9d6e;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, sans-serif;
    }

    .panel {
      width: 340px;
      max-width: 100%;
      margin: 0 auto;
      padding: 22px 20px 20px;
    }

    /* Wordmark */
    .brand { display: flex; align-items: center; gap: 9px; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, var(--glow-magenta) 70%);
      box-shadow: 0 0 8px 2px rgba(255, 61, 240, 0.55);
    }
    h1 {
      font-family: var(--mono);
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      margin: 0;
    }
    .tagline { color: var(--muted); font-size: 12px; margin: 6px 0 22px; }

    .eyebrow {
      display: block;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 9px;
    }

    /* Shortcut keycap */
    #shortcut {
      font-family: var(--mono);
      font-size: 15px; letter-spacing: 0.04em;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 13px 14px;
      width: 100%;
      cursor: pointer;
      text-align: center;
      box-shadow: inset 0 -2px 0 rgba(29, 22, 48, 0.06);
      transition: border-color 0.15s, transform 0.05s;
    }
    #shortcut:hover { border-color: rgba(200, 0, 190, 0.45); }
    #shortcut:active { transform: translateY(1px); }
    #shortcut:focus-visible { outline: 2px solid var(--magenta); outline-offset: 2px; }
    #shortcut.recording {
      color: var(--magenta);
      border-color: transparent;
      animation: keycapWorm 0.8s linear infinite;
    }

    /* Laser pointer with a fading 3-dot trail, circling the keycap. */
    @keyframes keycapWorm {
      0% { box-shadow: -12px -12px 4px 0 #ff5cf6, -13px 0 4px -1px rgba(255,61,240,.5), -12px 12px 5px -2px rgba(180,40,255,.28), 0 13px 6px -3px rgba(157,0,255,.12); }
      12.5% { box-shadow: 0 -13px 4px 0 #ff5cf6, -12px -12px 4px -1px rgba(255,61,240,.5), -13px 0 5px -2px rgba(180,40,255,.28), -12px 12px 6px -3px rgba(157,0,255,.12); }
      25% { box-shadow: 12px -12px 4px 0 #ff5cf6, 0 -13px 4px -1px rgba(255,61,240,.5), -12px -12px 5px -2px rgba(180,40,255,.28), -13px 0 6px -3px rgba(157,0,255,.12); }
      37.5% { box-shadow: 13px 0 4px 0 #ff5cf6, 12px -12px 4px -1px rgba(255,61,240,.5), 0 -13px 5px -2px rgba(180,40,255,.28), -12px -12px 6px -3px rgba(157,0,255,.12); }
      50% { box-shadow: 12px 12px 4px 0 #ff5cf6, 13px 0 4px -1px rgba(255,61,240,.5), 12px -12px 5px -2px rgba(180,40,255,.28), 0 -13px 6px -3px rgba(157,0,255,.12); }
      62.5% { box-shadow: 0 13px 4px 0 #ff5cf6, 12px 12px 4px -1px rgba(255,61,240,.5), 13px 0 5px -2px rgba(180,40,255,.28), 12px -12px 6px -3px rgba(157,0,255,.12); }
      75% { box-shadow: -12px 12px 4px 0 #ff5cf6, 0 13px 4px -1px rgba(255,61,240,.5), 12px 12px 5px -2px rgba(180,40,255,.28), 13px 0 6px -3px rgba(157,0,255,.12); }
      87.5% { box-shadow: -13px 0 4px 0 #ff5cf6, -12px 12px 4px -1px rgba(255,61,240,.5), 0 13px 5px -2px rgba(180,40,255,.28), 12px 12px 6px -3px rgba(157,0,255,.12); }
      100% { box-shadow: -12px -12px 4px 0 #ff5cf6, -13px 0 4px -1px rgba(255,61,240,.5), -12px 12px 5px -2px rgba(180,40,255,.28), 0 13px 6px -3px rgba(157,0,255,.12); }
    }

    #hint { color: #c2185b; font-size: 12px; min-height: 1.1em; margin: 9px 0 0; }

    .divider {
      height: 1px; border: 0; margin: 20px 0;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    /* Glow toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-weight: 600; }
    .switch { position: relative; display: inline-flex; flex: none; }
    .switch input {
      position: absolute; inset: 0; margin: 0;
      width: 100%; height: 100%; opacity: 0; cursor: pointer;
    }
    .track {
      width: 44px; height: 24px; border-radius: 999px;
      background: #ddd5ec; border: 1px solid var(--line);
      transition: background 0.2s, border-color 0.2s;
    }
    .track::after {
      content: ""; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 2px rgba(29, 22, 48, 0.25);
      transition: transform 0.2s;
    }
    .switch input:checked + .track {
      background: linear-gradient(90deg, var(--glow-purple), var(--glow-magenta));
      border-color: transparent;
    }
    .switch input:checked + .track::after { transform: translateX(20px); }
    .switch input:focus-visible + .track { outline: 2px solid var(--magenta); outline-offset: 2px; }

    /* Footer */
    .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 22px; }
    #reset {
      background: none; border: 0; padding: 0; font: inherit;
      color: var(--muted); cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }
    #reset:hover { color: var(--text); }
    #reset:focus-visible { outline: 2px solid var(--magenta); outline-offset: 2px; border-radius: 2px; }
    #status { color: var(--success); font-size: 13px; min-height: 1.2em; }

    @media (prefers-reduced-motion: reduce) {
      #shortcut.recording {
        animation: none;
        box-shadow: 0 0 9px 1px rgba(255, 61, 240, 0.45);
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <h1>Search Focus</h1>
    </div>
    <p class="tagline">Jump to any search box with a keystroke.</p>

    <label class="eyebrow" for="shortcut">Shortcut</label>
    <button id="shortcut" type="button">…</button>
    <p id="hint"></p>

    <hr class="divider" />

    <div class="toggle-row">
      <span class="toggle-label">Glow animation</span>
      <label class="switch">
        <input type="checkbox" id="glow" />
        <span class="track" aria-hidden="true"></span>
      </label>
    </div>

    <div class="footer">
      <button id="reset" type="button">Reset to default</button>
      <span id="status" role="status" aria-live="polite"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
