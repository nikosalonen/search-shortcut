<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3df0"/>
      <stop offset="1" stop-color="#9d00ff"/>
    </linearGradient>
    <radialGradient id="tile" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0" stop-color="#231838"/>
      <stop offset="1" stop-color="#0e0b14"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="3" y="3" width="122" height="122" rx="29"
        fill="url(#tile)" stroke="rgba(157,0,255,0.30)" stroke-width="1.5"/>

  <g fill="none" stroke="url(#stroke)" stroke-width="11" stroke-linecap="round" filter="url(#glow)">
    <circle cx="54" cy="54" r="27"/>
    <line x1="74" y1="74" x2="95" y2="95"/>
  </g>
</svg>
